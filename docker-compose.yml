networks:
  alphazero_net:
    driver: bridge

services:
  ray-head:
    build: 
      context: .
      dockerfile: docker/Dockerfile
      args:
        GPU_SUFFIX: ${GPU_SUFFIX}
        PYTORCH_URL: ${PYTORCH_URL}
    # Thêm prefix 'custom-' để tránh ghi đè nhầm vào image gốc của Ray trong cache máy bạn
    image: custom-ray:2.40.0${GPU_SUFFIX}   
    env_file:
      - .env
    container_name: ray-head
    shm_size: ${SHM_SIZE}
    ports:
      - "8265:8265"
      - "6379:6379"
      - "10001:10001"
    command: >
      ray start --head 
      --port=6379 
      --dashboard-host=0.0.0.0 
      --dashboard-port=8265 
      --num-cpus=${CPU_CORES}
      --num-gpus=${GPU_COUNT}
      --block
    volumes:
      - ./data:/home/ray/data
      - ./ray-jobs:/home/ray/ray-jobs
      - ./training:/home/ray/training
      - ./.env:/home/ray/.env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
    networks:
      - alphazero_net

  ray-worker:
    build: 
      context: .
      dockerfile: docker/Dockerfile
      args:
        GPU_SUFFIX: ${GPU_SUFFIX}
        PYTORCH_URL: ${PYTORCH_URL}
    image: custom-ray:2.40.0${GPU_SUFFIX}
    env_file:
      - .env
    # container_name: ray-worker (Đã comment đúng, vì khi scale replicas không được để tên cứng)
    shm_size: ${SHM_SIZE}
    command: ray start --address=ray-head:6379 --num-cpus=${CPU_CORES} --num-gpus=0 --block
    depends_on:
      - ray-head
    volumes:
      - ./data:/home/ray/data
      - ./ray-jobs:/home/ray/ray-jobs
      - ./training:/home/ray/training
      - ./.env:/home/ray/.env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
    deploy:
      replicas: ${RAY_WORKER_REPLICAS}
    networks:
      - alphazero_net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data # Dùng Bind mount để bạn dễ xem file thô trên máy tính
    networks:
      - alphazero_net

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: mlflow-server
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://chess-data/models
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow # Dùng Named volume do SQLite database quản lý
    depends_on:
      - minio
    networks:
      - alphazero_net

volumes:
  mlflow_data: 
  # Đã dọn dẹp minio-data và kafka-data ở đây để tránh cảnh báo (warning) của Docker