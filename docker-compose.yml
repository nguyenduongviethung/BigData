services:
  ray-head:
    build: 
      context: .
      dockerfile: docker/Dockerfile
      args:
        GPU_SUFFIX: ${GPU_SUFFIX}
        PYTORCH_URL: ${PYTORCH_URL}
    image: rayproject/ray:2.40.0${GPU_SUFFIX}   # Tự động chọn image GPU hoặc CPU
    env_file:
      - .env
    container_name: ray-head
    shm_size: ${SHM_SIZE}
    ports:
      - "8265:8265"
      - "6379:6379"
      - "10001:10001"
    command: >
      ray start --head 
      --port=6379 
      --dashboard-host=0.0.0.0 
      --dashboard-port=8265 
      --num-cpus=${CPU_CORES}
      --num-gpus=${GPU_COUNT}
      --block
    volumes:
      - ./data:/home/ray/data
      - ./ray-jobs:/home/ray/ray-jobs
      - ./training:/home/ray/training
      - ./.env:/home/ray/.env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}

  ray-worker:
    build: 
      context: .
      dockerfile: docker/Dockerfile
      args:
        GPU_SUFFIX: ${GPU_SUFFIX}
        PYTORCH_URL: ${PYTORCH_URL}
    image: rayproject/ray:2.40.0${GPU_SUFFIX}
    env_file:
      - .env
    # container_name: ray-worker
    shm_size: ${SHM_SIZE}
    command: ray start --address=ray-head:6379 --num-cpus=${CPU_CORES} --num-gpus=0 --block
    depends_on:
      - ray-head
    volumes:
      - ./data:/home/ray/data
      - ./ray-jobs:/home/ray/ray-jobs
      - ./training:/home/ray/training
      - ./.env:/home/ray/.env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    deploy:
      replicas: ${RAY_WORKER_REPLICAS}

  # kafka:
  #   image: apache/kafka:latest
  #   container_name: kafka
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_NODE_ID: 1
  #     KAFKA_PROCESS_ROLES: broker,controller
  #     KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
  #     KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
  #     KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: mlflow-server
    ports:
      - "5000:5000"
    environment:
      # MLflow cần thông tin này để có quyền lấy file mô hình từ MinIO
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://chess-data/models
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - minio

volumes:
  kafka-data:
  minio-data:
  mlflow_data: